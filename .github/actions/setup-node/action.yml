name: Setup node
description: Sets up Node natively on GitHub or upgrades it dynamically inside act

runs:
  using: composite
  steps:
    # 1. RUNS ONLY ON GITHUB: Standard clean installation from scratch
    - name: Setup Node.js (GitHub)
      if: ${{ !env.ACT }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        cache: pnpm
        node-version-file: package.json

    # 2. RUNS ONLY IN ACT: Upgrade the container node version matching package.json
    - name: Setup Node.js (Act)
      if: ${{ env.ACT }}
      shell: bash
      run: .github/scripts/update-node-in-act-container-to-match-the-one-specified-in-package-json.sh
