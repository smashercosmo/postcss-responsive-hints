name: Setup project
description: Generate GitHub token, configure GIT, install pnpm, setup Node, install dependencies

inputs:
  client-id:
    description: GitHub App client ID
    required: true
  private-key:
    description: GitHub App private key
    required: true
  permission-contents:
    description: Contents permission for the GitHub App token
    required: false
  permission-pull-requests:
    description: Pull requests permission for the GitHub App token
    required: false

outputs:
  token:
    description: GitHub App installation access token
    value: ${{ steps.generate-token.outputs.token }}
  app-slug:
    description: GitHub App slug
    value: ${{ steps.generate-token.outputs.app-slug }}

runs:
  using: composite
  steps:
    - name: Generate GitHub token
      id: generate-token
      uses: ./.github/actions/generate-token
      with:
        client-id: ${{ inputs.client-id }}
        private-key: ${{ inputs.private-key }}
        permission-contents: ${{ inputs.permission-contents }}
        permission-pull-requests: ${{ inputs.permission-pull-requests }}

    - name: Configure Git Identity
      shell: bash
      run: .github/scripts/configure-git-identity.sh
      env:
        TOKEN: ${{ steps.generate-token.outputs.token }}
        APP_SLUG: ${{ steps.generate-token.outputs.app-slug }}

    - name: Install pnpm
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      with:
        cache: true
        # --frozen-lockfile might be redundant as for ci environments it's always set
        # https://pnpm.io/cli/install#--frozen-lockfile
        run_install: |
          args: [--frozen-lockfile]

    - name: Setup node
      uses: ./.github/actions/setup-node