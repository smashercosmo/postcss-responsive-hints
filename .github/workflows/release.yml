name: Run checks and release

on:
  push:
    branches:
      - main

jobs:
  # Job 1: The Gatekeeper (Instantly cancels if no change files exist)
  prerelease:
    name: Pre-release check
    runs-on: ubuntu-latest
    # Setting 1: This job can just get output from actions.
    permissions:
      actions: read # Required to gracefully cancel the workflow
    outputs:
      shouldRelease: ${{ steps.check.outputs.shouldRelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1 # Lets's be explicit here: should-release action doesn't need the full GitHub history
          persist-credentials: false

      - name: Check if release is needed
        uses: microsoft/beachball-actions/should-release@cf7d34819ad50dce8894b3ff99a2a7899aefee3d # v3.1.0
        id: check
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          mode: output


  # Job 2: The Actual Release
  release:
    name: Release
    needs: prerelease
    if: ${{ needs.prerelease.outputs.shouldRelease == 'yes' }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      # for trusted publishing
      id-token: write

    steps:
      - name: Generate GitHub token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.generate-token.outputs.token }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0

      # Note: We omit lint/test here because the PR branch safely validated them before merge!

      - name: Configure Git Identity
        env:
          # We grab the slug from the generation step
          APP_SLUG: ${{ steps.generate-token.outputs.app-slug }}
        # We use the slug to dynamically set the bot's name and email!
        run: |
          git config --global user.name "${APP_SLUG}[bot]"
          git config --global user.email "${APP_SLUG}[bot]@users.noreply.github.com"

      # No tokens needed! npm uses the OIDC identity automatically
      - name: Perform all Beachball chores instead of actual publish
        run: npm run release --ignore-dev-engines

      - name: Publish to npm
        run: npm stage publish --ignore-dev-engines

      - name: Generate GitHub release
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0)
          echo "Generating GitHub release for $LATEST_TAG..."

          gh release create "$LATEST_TAG" \
            --title "Release $LATEST_TAG" \
            --generate-notes