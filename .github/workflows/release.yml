name: Release

env:
  # errexit - exit immediately if any command fails
  # nounset - error on use of undefined variables
  # pipefail - pipeline fails if any command in it fails, not just the last one
  SHELLOPTS: errexit:nounset:pipefail

defaults:
  run:
    shell: bash

permissions: {}

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  version-and-pack:
    environment: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_changesets: ${{ steps.check.outputs.has_changesets }}
      artifact_created: ${{ steps.upload.outputs.artifact-id != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup
        id: setup
        uses: ./.github/actions/setup
        with:
          client-id: ${{ vars.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Add mock changeset
        if: >
          env.ACT == 'true' &&
          startsWith(github.event.head_commit.message, 'docs(changeset): Changes description')
        run: .github/scripts/add-mock-changeset.sh
        env:
          MERGE_TO_MAIN: "true"

      - name: Simulate release PR merge
        if: >
          env.ACT == 'true' &&
          startsWith(github.event.head_commit.message, 'chore: version packages')
        run: |
          .github/scripts/add-mock-changeset.sh
          .github/scripts/version-packages.sh
          .github/scripts/simulate-release-pr-merge.sh
        env:
          MERGE_TO_MAIN: "true"

      - name: Check for pending changesets
        id: check
        run: .github/scripts/check-for-pending-changesets.sh

      # --- Case A: pending changesets -> open/update version PR, stop here ---
      - name: Version packages
        if: steps.check.outputs.has_changesets == 'true'
        run: .github/scripts/version-packages.sh
        env: ${{ fromJSON(steps.setup.outputs.git_env_config) }}

      - name: Create/update release PR
        if: steps.check.outputs.has_changesets == 'true'
        run: .github/scripts/create-update-release-pr.sh
        env: ${{ fromJSON(steps.setup.outputs.git_env_config) }}

      # --- Case B: no pending changesets -> pack tarballs ---
      - name: Compute publish plan
        if: steps.check.outputs.has_changesets == 'false'
        run: pnpm changeset publish-plan --output=publish-plan.json

      - name: Pack tarballs from plan
        if: steps.check.outputs.has_changesets == 'false'
        run: pnpm changeset pack --from-publish-plan=publish-plan.json --out-dir tarballs

      # Doesn't work with act until this is resolved https://github.com/nektos/act/issues/6114
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        id: upload
        if: steps.check.outputs.has_changesets == 'false' && env.ACT != 'true'
        with:
          name: release-tarballs
          path: tarballs/**/*.tgz
          retention-days: 1
          if-no-files-found: ignore

  publish:
    needs: version-and-pack
    if: >
      needs.version-and-pack.outputs.has_changesets == 'false' &&
      needs.version-and-pack.outputs.artifact_created == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup
        id: setup
        uses: ./.github/actions/setup
        with:
          client-id: ${{ vars.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          permission-contents: write

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        id: download
        with:
          name: release-tarballs
          pattern: tarballs/**/*.tgz
          path: tarballs/

      - name: Publish tarballs
        run: |
          cd ${{ steps.download.outputs.download-path }}/packages
          for tgz in *.tgz; do
            pnpm stage publish "$tgz" \
              --no-git-checks \
              --access public \
              --provenance
          done

      - name: Create tags and GitHub release
        run: .github/scripts/create-tags-and-github-release.sh
        env: ${{ fromJSON(steps.setup.outputs.git_env_config) }}
