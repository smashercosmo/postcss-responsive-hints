name: Release

env:
  # errexit - exit immediately if any command fails
  # nounset - error on use of undefined variables
  # pipefail - pipeline fails if any command in it fails, not just the last one
  SHELLOPTS: errexit:nounset:pipefail

defaults:
  run:
    shell: bash

permissions: {}

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  version-and-pack:
    environment: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_changesets: ${{ steps.check.outputs.has_changesets }}
      artifact_created: ${{ steps.upload.outputs.artifact-id != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup
        id: setup
        uses: ./.github/actions/setup
        with:
          client-id: ${{ vars.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Add mock changeset
        if: >
          env.ACT == 'true' &&
          startsWith(github.event.head_commit.message, 'docs(changeset): Changes description')
        run: .github/scripts/add-mock-changeset.sh
        env:
          MERGE_TO_MAIN: "true"

      - name: Simulate release PR merge
        if: >
          env.ACT == 'true' &&
          startsWith(github.event.head_commit.message, 'chore: version packages')
        run: |
          .github/scripts/add-mock-changeset.sh
          .github/scripts/version-packages.sh
          .github/scripts/simulate-release-pr-merge.sh
        env:
          MERGE_TO_MAIN: "true"

      - name: Check for pending changesets
        id: check
        run: .github/scripts/check-for-pending-changesets.sh

      # --- Case A: pending changesets -> create release PR, stop here ---
      - name: Create release PR
        if: steps.check.outputs.has_changesets == 'true'
        uses: ./.github/actions/create-release-pr
        with:
          git_env_config: ${{ steps.setup.outputs.git_env_config }}

      # --- Case B: no pending changesets -> pack and upload tarballs ---
      - name: Pack and upload tarballs
        if: steps.check.outputs.has_changesets == 'false'
        uses: ./.github/actions/pack-and-upload-tarballs

  publish:
    needs: version-and-pack
    if: >
      needs.version-and-pack.outputs.has_changesets == 'false' &&
      needs.version-and-pack.outputs.artifact_created == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup
        id: setup
        uses: ./.github/actions/setup
        with:
          client-id: ${{ vars.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          permission-contents: write

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        id: download
        with:
          name: release-tarballs
          path: tarballs/

      - name: Publish tarballs
        run: .github/scripts/publish-tarballs.sh

      - name: Create tags and GitHub release
        run: .github/scripts/create-tags-and-github-release.sh
        env: ${{ fromJSON(steps.setup.outputs.git_env_config) }}
