name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  version-and-pack:
    environment: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    outputs:
      has_changesets: ${{ steps.check.outputs.has_changesets }}
      artifact_created: ${{ steps.upload.outputs.artifact-id != '' }}
    steps:
      - name: Generate GitHub token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}
          persist-credentials: false

      - name: Configure Git Identity
        env:
          APP_SLUG: ${{ steps.generate-token.outputs.app-slug }}
        run: |
          git config --global user.name "${APP_SLUG}[bot]"
          git config --global user.email "${APP_SLUG}[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ steps.generate-token.outputs.token }}@github.com/smashercosmo/postcss-responsive-hints"   
          

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup node
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        run: pnpm ci

      - name: Add mock changeset
        if: >
          env.ACT == 'true' &&
          startsWith(github.event.head_commit.message, 'docs(changeset): Changes description')
        shell: bash
        run: .github/scripts/add-mock-changeset.sh
        env:
          MERGE_TO_MAIN: "true"

      - name: Simulate release PR merge
        if: >
          env.ACT == 'true' &&
          startsWith(github.event.head_commit.message, 'chore: version packages')
        shell: bash
        run: |
          .github/scripts/add-mock-changeset.sh
          .github/scripts/version-packages.sh
          .github/scripts/simulate-release-pr-merge.sh
        env:
          MERGE_TO_MAIN: "true"

      - name: Check for pending changesets
        id: check
        shell: bash
        run: .github/scripts/check-for-pending-changesets.sh

      # --- Case A: pending changesets -> open/update version PR, stop here ---
      - name: Version packages
        if: steps.check.outputs.has_changesets == 'true'
        shell: bash
        run: .github/scripts/version-packages.sh

      - name: Create/update release PR
        if: steps.check.outputs.has_changesets == 'true'
        shell: bash
        run: .github/scripts/create-update-release-pr.sh

      # --- Case B: no pending changesets -> pack tarballs ---
      - name: Compute publish plan
        if: steps.check.outputs.has_changesets == 'false'
        run: pnpm changeset publish-plan --output=publish-plan.json

      - name: Pack tarballs from plan
        if: steps.check.outputs.has_changesets == 'false'
        run: pnpm changeset pack --from-publish-plan=publish-plan.json --out-dir tarballs

      # Doesn't work with act until this is resolved https://github.com/nektos/act/issues/6114
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        id: upload
        if: steps.check.outputs.has_changesets == 'false' && env.ACT != 'true'
        with:
          name: release-tarballs
          path: tarballs/**/*.tgz
          retention-days: 1
          if-no-files-found: ignore

  publish:
    needs: version-and-pack
    if: >
      needs.version-and-pack.outputs.has_changesets == 'false' &&
      needs.version-and-pack.outputs.artifact_created == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Generate GitHub token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.generate-token.outputs.token }}
          persist-credentials: false

      - name: Configure Git Identity
        env:
          APP_SLUG: ${{ steps.generate-token.outputs.app-slug }}
        run: |
          git config --global user.name "${APP_SLUG}[bot]"
          git config --global user.email "${APP_SLUG}[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ steps.generate-token.outputs.token }}@github.com/smashercosmo/postcss-responsive-hints" 

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup node
        uses: ./.github/actions/setup-node

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-tarballs
          path: tarballs/

      - name: Publish tarballs
        run: |
          for tgz in tarballs/*.tgz; do
            pnpm stage publish "$tgz" --no-git-checks --access public --provenance
          done

      - name: Create tags and GitHub release
        run: .github/scripts/create-tags-and-github-release.sh
