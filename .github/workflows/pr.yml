name: PR check

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, test, and check changes
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          cache: true

      - name: Setup node
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        run: pnpm ci

      - name: Add mock changeset (ACT)
        if: env.ACT && github.head_ref != 'changeset-release/main'
        shell: bash
        run: .github/scripts/add-mock-changeset.sh

      - name: Require a changeset for publishable changes
        if: github.head_ref != 'changeset-release/main'
        shell: bash
        run: .github/scripts/get-changeset-status.sh

      - name: Check if this is changeset-release/main PR
        if: github.head_ref == 'changeset-release/main'
        shell: bash
        run: |
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo '{ "github": { "head_ref": "changeset-release/main" } }' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"